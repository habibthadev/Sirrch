<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			http-equiv="X-UA-Compatible"
			content="IE=edge"
		/>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<meta
			name="author"
			content="Habib Adebayo"
		/>
		<meta
			name="description"
			content="An online dictionary for searching meaning, synonmys of words with source created by Habib Adebayo"
		/>
		<meta
			name="keywords"
			content="sirrch, sirrch dictionary, dictionary, word,text, Habib dictionary, Habib Adebayo dictionary, Habib Sirrch, Habib Adebayo	Sirrch, text, search, find, find word, search word"
		/>
		<link
			rel="stylesheet"
			href="index.css"
		/>
		<link
			rel="manifest"
			href="./manifest.json"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
		/>
		<link
			rel="canonical"
			href="https://sirrch.netlify.app"
		/>
		<title> Sirrch Dictionary </title>
	</head>
	<body>
		<section class="grid">
			<section class="subgrid">
				<header>
					<h1>Sirrch</h1>
					<div class="toggle">
						<div class="ball"></div>
					</div>
				</header>
				<main>
					<div class="search">
						<input
							type="text"
							placeholder="Search for any word..."
						/>
						<audio
							src=""
							id="audio"
						></audio>
						<button
							class="fa fa-search"
						></button>
					</div>
					<section
						class="loader"
					></section>
					<section
						class="not-found"
					></section>
					<section
						class="search-result"
					>
						<section
							class="search-head"
						></section>
						<section
							class="search-meanings"
						></section>
						<section
							class="source"
						></section>
					</section>
				</main>
			</section>
		</section>
		<script>
			if (
				"serviceWorker" in navigator
			) {
				window.addEventListener(
					"load",
					function () {
						navigator.serviceWorker.register(
							"/service-worker.js"
						);
					}
				);
			}
		</script>
		<script src="./service-worker.js"></script>
		<script src="index.js"></script>
	</body>
</html>
