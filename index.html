<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			http-equiv="X-UA-Compatible"
			content="IE=edge"
		/>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<link
			rel="stylesheet"
			href="index.css"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
		/>
		<title> Dictionary </title>
	</head>
	<body>
		<section class="grid">
			<section class="subgrid">
				<header>
					<h1>Sirrch</h1>
					<div class="toggle">
						<div class="ball"></div>
					</div>
				</header>
				<main>
					<div class="search">
						<input
							type="text"
							placeholder="Search for any word..."
						/>
						<audio
							src=""
							id="audio"
						></audio>
						<button
							class="fa fa-search"
						></button>
					</div>
					<section
						class="loader"
					></section>
					<section
						class="not-found"
					></section>
					<section
						class="search-result"
					>
						<section
							class="search-head"
						></section>
						<section
							class="search-meanings"
						></section>
						<section
							class="source"
						></section>
					</section>
				</main>
			</section>
		</section>
		<script src="index.js"></script>
	</body>
</html>
